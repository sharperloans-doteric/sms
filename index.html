
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick SMS Link</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 95%;
            padding: 15px;
            background: #25D366; /* WhatsApp/SMS Green */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Open Conversation</h2>
    <p style="color: #666; font-size: 14px;">This will open your messaging app to the number entered.</p>
    
    <input type="tel" id="phone" placeholder="Phone Number (e.g. +123456789)">
    <textarea id="message" rows="4" placeholder="Type your draft message here..."></textarea>
    
    <button onclick="openSMS()">Open Messages</button>
</div>

<script>
function openSMS() {
    const phone = document.getElementById("phone").value.trim();
    const message = document.getElementById("message").value;
    
    if (!phone) {
        alert("Please enter a phone number first.");
        return;
    }

    // Different OS behavior: 
    // iOS often prefers '&' while Android and older systems prefer '?'
    // Using '?' is the most universal standard for the body.
    const smsLink = `sms:${phone}?body=${encodeURIComponent(message)}`;
    
    window.location.href = smsLink;
}
</script>

</body>
</html>

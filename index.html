

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick SMS KE</title>
    <style>
        body { font-family: Arial, sans-serif; background: #00b140; color: white; margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: white; color: #333; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #00b140; margin-bottom: 10px; }
        p { text-align: center; color: #555; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { width: 100%; background: #00b140; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; margin-top: 20px; }
        .note { font-size: 13px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🇰🇪 Quick SMS</h1>
        <p>Opens your normal SMS app (Safaricom, Airtel, etc.)</p>
        
        <label>Phone Number</label>
        <input type="tel" id="number" placeholder="0712345678" maxlength="15">
        
        <label>Message</label>
        <textarea id="message" rows="5" placeholder="Type your message here..."></textarea>
        
        <button onclick="sendSMS()">SEND TO SMS APP</button>
        
        <div class="note">
            ✅ Message appears in your normal Messages app<br>
            ✅ Works with all networks
        </div>
    </div>

    <script>
        function sendSMS() {
            let num = document.getElementById("number").value.trim();
            let msg = document.getElementById("message").value.trim();
            
            if (!num) return alert("Enter phone number");
            if (!msg) return alert("Type a message");
            
            window.location.href = `sms:${num}?body=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
